<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Kothic JS pixelmatch render fixture</title>

	<script src="../debug/kothic-include.js"></script>
	<script src="../debug/styles/osmosnimki.js"></script>
</head>
<body>
	<canvas id="map" width="384" height="384"></canvas>

	<script type="text/javascript">
        var tile_zoom = 17;
        var tile_data = {
            "granularity": 10000,
            "features": [
                {
                    "type": "Polygon",
                    "properties": {
                        "natural": "water",
                        "name": "Fixture Bay"
                    },
                    "coordinates": [[[0, 0], [0, 2600], [10000, 2600], [10000, 0], [0, 0]]]
                },
                {
                    "type": "Polygon",
                    "properties": {
                        "fixture": "pattern-fill",
                        "name": "Pattern Park"
                    },
                    "coordinates": [[[700, 5600], [700, 8100], [3000, 8100], [3000, 5600], [700, 5600]]]
                },
                {
                    "type": "Polygon",
                    "properties": {
                        "landuse": "residential"
                    },
                    "coordinates": [[[0, 2600], [0, 10000], [10000, 10000], [10000, 2600], [0, 2600]]]
                },
                {
                    "type": "LineString",
                    "properties": {
                        "highway": "residential",
                        "name": "Rotated Street"
                    },
                    "coordinates": [[900, 7100], [3300, 5900], [6100, 6100], [9300, 4300]]
                },
                {
                    "type": "LineString",
                    "properties": {
                        "waterway": "stream",
                        "name": "Italic Brook"
                    },
                    "coordinates": [[800, 1450], [2800, 1050], [5100, 1700], [7500, 950], [9400, 1250]]
                },
                {
                    "type": "LineString",
                    "properties": {
                        "highway": "primary",
                        "name": "Bold Avenue"
                    },
                    "coordinates": [[1500, 9250], [5200, 8100], [9000, 8650]]
                },
                {
                    "type": "Polygon",
                    "properties": {
                        "building": "yes"
                    },
                    "coordinates": [[[5850, 5600], [7200, 5600], [7200, 6950], [5850, 6950], [5850, 5600]]]
                },
                {
                    "type": "Point",
                    "properties": {
                        "fixture-icon": "diamond",
                        "name": "Sprite Diamond"
                    },
                    "coordinates": [1600, 5350]
                },
                {
                    "type": "Point",
                    "properties": {
                        "fixture-icon": "circle",
                        "name": "Sprite Circle"
                    },
                    "coordinates": [8350, 5650]
                },
                {
                    "type": "Point",
                    "properties": {
                        "fixture-icon": "triangle",
                        "name": "Sprite Triangle"
                    },
                    "coordinates": [8400, 7350]
                },
                {
                    "type": "Point",
                    "properties": {
                        "fixture-icon": "square",
                        "name": "Sprite Square"
                    },
                    "coordinates": [6400, 8200]
                },
                {
                    "type": "Point",
                    "properties": {
                        "fixture-icon": "cross",
                        "name": "Serif Icon"
                    },
                    "coordinates": [4300, 5000]
                },
                {
                    "type": "Point",
                    "properties": {
                        "fixture": "opacity-label",
                        "name": "Fade"
                    },
                    "coordinates": [8400, 9200]
                },
                {
                    "type": "Point",
                    "properties": {
                        "place": "village",
                        "name": "Halo Village"
                    },
                    "coordinates": [2600, 9300]
                }
            ]
        };

        var onImagesLoad = MapCSS.onImagesLoad;

        invertYAxe(tile_data);

        MapCSS.onImagesLoad = function () {
            onImagesLoad();
            Kothic.render('map', tile_data, tile_zoom, {
                styles: ['osmosnimki', 'pixelmatch-fixture'],
                onRenderComplete: function () {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            window.__kothicRenderComplete = true;
                        });
                    });
                }
            });
        };

        var fixtureSpriteImages = {
            'fixture-diamond.png': {
                width: 32,
                height: 32,
                offset: 0
            },
            'fixture-circle.png': {
                width: 32,
                height: 32,
                offset: 32
            },
            'fixture-triangle.png': {
                width: 32,
                height: 32,
                offset: 64
            },
            'fixture-square.png': {
                width: 32,
                height: 32,
                offset: 96
            },
            'fixture-cross.png': {
                width: 32,
                height: 32,
                offset: 128
            },
            'fixture-pattern.png': {
                width: 32,
                height: 32,
                offset: 160
            }
        };

        MapCSS.loadStyle('pixelmatch-fixture', function (style, tags, zoom, type, selector) {
            var s_default = {};

            if (selector === 'area' && tags['fixture'] === 'pattern-fill') {
                s_default['fill-color'] = '#d8efbf';
                s_default['fill-image'] = 'fixture-pattern.png';
                s_default['z-index'] = 3;
            }

            if (type === 'node' && tags['fixture-icon']) {
                s_default['icon-image'] = 'fixture-' + tags['fixture-icon'] + '.png';
                s_default['icon-width'] = 16;
                s_default['icon-height'] = 16;
                s_default['text'] = MapCSS.e_localize(tags, 'name');
                s_default['text-offset'] = 13;
                s_default['font-size'] = '9';
                s_default['font-family'] = tags['fixture-icon'] === 'cross' ?
                        'DejaVu Serif Italic' : 'DejaVu Sans Book';
                s_default['text-color'] = tags['fixture-icon'] === 'cross' ? '#623f00' : '#143a7a';
                s_default['text-halo-radius'] = 1;
                s_default['text-halo-color'] = '#ffffff';
                s_default['allow-overlap'] = 'true';
                s_default['text-allow-overlap'] = 'true';
                s_default['z-index'] = 18;
            }

            if (type === 'node' && tags['fixture'] === 'opacity-label') {
                s_default['text'] = MapCSS.e_localize(tags, 'name');
                s_default['font-size'] = '16';
                s_default['font-family'] = 'DejaVu Sans Book';
                s_default['text-color'] = '#101010';
                s_default['text-opacity'] = '0.35';
                s_default['text-allow-overlap'] = 'true';
                s_default['z-index'] = 20;
            }

            if (Object.keys(s_default).length) {
                style['default'] = s_default;
            }

            return style;
        }, fixtureSpriteImages, [], ['fixture'], ['fixture-icon']);

        installFixtureSprite(fixtureSpriteImages);

        MapCSS.preloadSpriteImage("osmosnimki", "../debug/styles/osmosnimki.png");

        function installFixtureSprite(images) {
            var sprite = document.createElement('canvas');
            var ctx = sprite.getContext('2d');
            var image;

            sprite.width = 32;
            sprite.height = 192;

            drawDiamond(ctx, 16, 16, '#e34a33');
            drawCircle(ctx, 16, 48, '#2b8cbe');
            drawTriangle(ctx, 16, 80, '#31a354');
            drawSquare(ctx, 16, 112, '#756bb1');
            drawCross(ctx, 16, 144, '#111111');
            drawPattern(ctx, 0, 160);

            for (image in images) {
                if (images.hasOwnProperty(image)) {
                    images[image].sprite = sprite;
                    MapCSS.images[image] = images[image];
                }
            }
            MapCSS.styles['pixelmatch-fixture'].sprite_loaded = true;
        }

        function drawDiamond(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - 14);
            ctx.lineTo(x + 14, y);
            ctx.lineTo(x, y + 14);
            ctx.lineTo(x - 14, y);
            ctx.closePath();
            ctx.fill();
        }

        function drawCircle(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawTriangle(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y - 14);
            ctx.lineTo(x + 14, y + 12);
            ctx.lineTo(x - 14, y + 12);
            ctx.closePath();
            ctx.fill();
        }

        function drawSquare(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x - 12, y - 12, 24, 24);
        }

        function drawCross(ctx, x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x - 4, y - 14, 8, 28);
            ctx.fillRect(x - 14, y - 4, 28, 8);
        }

        function drawPattern(ctx, x, y) {
            ctx.fillStyle = '#d8efbf';
            ctx.fillRect(x, y, 32, 32);
            ctx.fillStyle = '#6fbf73';
            ctx.fillRect(x + 4, y + 4, 8, 8);
            ctx.fillRect(x + 20, y + 20, 8, 8);
            ctx.fillStyle = '#3d8f4f';
            ctx.fillRect(x + 20, y + 4, 8, 8);
            ctx.fillRect(x + 4, y + 20, 8, 8);
        }

        function invertYAxe(data) {
            var type, coordinates, tileSize = data.granularity, i, j, k, l, feature;
            for (i = 0; i < data.features.length; i++) {
                feature = data.features[i];
                coordinates = feature.coordinates;
                type = data.features[i].type;
                if (type == 'Point') {
                    coordinates[1] = tileSize - coordinates[1];
                } else if (type == 'MultiPoint' || type == 'LineString') {
                    for (j = 0; j < coordinates.length; j++) {
                        coordinates[j][1] = tileSize - coordinates[j][1];
                    }
                } else if (type == 'MultiLineString' || type == 'Polygon') {
                    for (k = 0; k < coordinates.length; k++) {
                        for (j = 0; j < coordinates[k].length; j++) {
                            coordinates[k][j][1] = tileSize - coordinates[k][j][1];
                        }
                    }
                } else if (type == 'MultiPolygon') {
                    for (l = 0; l < coordinates.length; l++) {
                        for (k = 0; k < coordinates[l].length; k++) {
                            for (j = 0; j < coordinates[l][k].length; j++) {
                                coordinates[l][k][j][1] = tileSize - coordinates[l][k][j][1];
                            }
                        }
                    }
                }

                if ('reprpoint' in feature) {
                    feature.reprpoint[1] = tileSize - feature.reprpoint[1];
                }
            }
        }
	</script>
</body>
</html>
